<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gadget Store - Đăng nhập</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">
  <div class="login-wrap">
    <div class="login-card">
      <div class="text-center mb-4">
        <a href="index.html" class="text-decoration-none">
          <span class="login-brand"><i class="bi bi-cpu"></i> Gadget Store</span>
        </a>
        <p class="text-muted mt-2 mb-0">Đăng nhập để tiếp tục</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label class="form-label" for="username">Tên đăng nhập</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-secondary text-muted">
              <i class="bi bi-person"></i>
            </span>
            <input
              id="username"
              type="text"
              class="form-control border-secondary"
              placeholder="admin hoặc user1"
              required
              autocomplete="username"
            />
            <div class="invalid-feedback">Vui lòng nhập tên đăng nhập.</div>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label" for="password">Mật khẩu</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-secondary text-muted">
              <i class="bi bi-lock"></i>
            </span>
            <input
              id="password"
              type="password"
              class="form-control border-secondary"
              placeholder="Mật khẩu"
              required
              autocomplete="current-password"
            />
            <div class="invalid-feedback">Vui lòng nhập mật khẩu.</div>
          </div>
        </div>

        <button type="submit" id="btnLogin" class="btn btn-primary w-100 rounded-pill py-2">
          <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
        </button>
      </form>

      <div class="login-hint mt-4">
        <p class="small text-muted mb-1"><strong>Admin:</strong> admin / 123</p>
        <p class="small text-muted mb-0"><strong>User:</strong> user1 / 123</p>
      </div>

      <div class="text-center mt-4">
        <a href="index.html" class="small text-muted">
          <i class="bi bi-arrow-left"></i> Về trang chủ
        </a>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
