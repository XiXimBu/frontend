<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gadget Store - Trang chủ</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <i class="bi bi-shop"></i> Gadget Store
      </a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNav"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="#products">Sản phẩm</a></li>
          <li class="nav-item"><a class="nav-link" href="#compare">So sánh</a></li>
          <li class="nav-item"><a class="nav-link" href="#reviews">Đánh giá</a></li>
        </ul>
        <a href="admin.html" class="btn btn-outline-light btn-sm">
          <i class="bi bi-gear"></i> Quản trị
        </a>
      </div>
    </div>
  </nav>

  <header class="bg-primary text-white py-4">
    <div class="container">
      <h1 class="h3 mb-3">Khám phá sản phẩm công nghệ</h1>
      <div class="row g-2">
        <div class="col-md-6">
          <input
            id="searchInput"
            type="text"
            class="form-control"
            placeholder="Tìm kiếm sản phẩm..."
          />
        </div>
        <div class="col-md-3">
          <select id="categoryFilter" class="form-select">
            <option value="">Tất cả danh mục</option>
          </select>
        </div>
        <div class="col-md-3">
          <select id="sortFilter" class="form-select">
            <option value="">Sắp xếp</option>
            <option value="priceAsc">Giá tăng dần</option>
            <option value="priceDesc">Giá giảm dần</option>
            <option value="nameAsc">Tên A-Z</option>
          </select>
        </div>
      </div>
    </div>
  </header>

  <main class="container py-4">
    <section id="products">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h4">Danh sách sản phẩm</h2>
        <span id="productCount" class="text-muted"></span>
      </div>
      <div id="productList" class="row g-3">
      </div>
    </section>

    <section id="compare" class="mt-5">
      <h2 class="h4 mb-3">So sánh sản phẩm</h2>
      <div id="compareBox" class="table-responsive">
        <p class="text-muted">Chọn sản phẩm để so sánh.</p>
      </div>
    </section>

    <section id="reviews" class="mt-5">
      <h2 class="h4 mb-3">Đánh giá mới nhất</h2>
      <div id="reviewList" class="row g-3"></div>
    </section>
  </main>

  <div
    class="modal fade"
    id="productModal"
    tabindex="-1"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="productModalTitle">Chi tiết sản phẩm</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="productModalBody"></div>
      </div>
    </div>
  </div>

  <footer class="bg-dark text-white text-center py-3 mt-5">
    <small>&copy; 2026 Gadget Store</small>
  </footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
